name: Optimize CMS Images

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "assets/images/uploads/**"
      - "_posts/**"
      - "_data/**"
      - "*.html"
      - "_config.yml"
  workflow_dispatch:

jobs:
  optimize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp imagemagick

      - name: Optimize CMS uploads
        run: python3 scripts/optimize_cms_uploads.py --root .

      - name: Commit optimized images
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No image optimization changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/uploads _posts _data *.html _config.yml
          git commit -m "Optimize CMS uploads [skip ci]"
          git push

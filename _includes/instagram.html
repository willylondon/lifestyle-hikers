<!-- Instagram Feed Section -->
<section class="section instagram-section" id="social">
    <div class="container">
        <div class="section-header reveal">
            <span class="section-badge"><i class="fab fa-instagram"></i> Community</span>
            <h2 class="section-title">Follow The Journey</h2>
            <p class="section-subtitle">Tag @lifestylehikers or use #LifestyleHikersJA to be featured.</p>
        </div>

        <div class="ig-feed-container reveal"
            style="border-radius: var(--radius-lg); overflow: hidden; background: var(--clr-dark-card); border: 1px solid var(--clr-border);">
            <!-- Curator.io Instagram Feed -->
            <div id="curator-feed-default-feed-layout"><a href="https://curator.io" target="_blank" rel="noopener noreferrer"
                    class="crt-logo crt-tag">Powered by Curator.io</a></div>
        </div>

        <div style="text-align: center; margin-top: var(--space-xl);" class="reveal">
            <a href="https://www.instagram.com/lifestylehikers" target="_blank" rel="noopener noreferrer" class="nav-cta"
                aria-label="Open Lifestyle Hikers on Instagram in a new tab"
                style="display: inline-flex; align-items: center; gap: 8px;">
                <i class="fab fa-instagram"></i> View on Instagram
            </a>
        </div>
    </div>
    <script>
        (function () {
            var feed = document.getElementById('curator-feed-default-feed-layout');
            if (!feed) return;

            var loaded = false;
            function loadCuratorFeed() {
                if (loaded) return;
                loaded = true;
                var script = document.createElement('script');
                script.async = true;
                script.charset = 'UTF-8';
                script.src = 'https://cdn.curator.io/published/7a229ffc-c29f-4224-a039-63db290c5395.js';
                document.head.appendChild(script);
            }

            if ('IntersectionObserver' in window) {
                var observer = new IntersectionObserver(function (entries) {
                    if (entries.some(function (entry) { return entry.isIntersecting; })) {
                        loadCuratorFeed();
                        observer.disconnect();
                    }
                }, { rootMargin: '600px 0px' });
                observer.observe(feed);
            } else {
                window.addEventListener('load', loadCuratorFeed, { once: true });
            }
        })();
    </script>
</section>

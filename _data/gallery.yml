    alt: A beautiful hike out to Hermitage Dam and Fallen Edge Falls — cool air, flowing water, and the kind of peaceful views that make every step worth it. Grateful for the adventure, the laughter on the trail, and nature showing off after the rainy season.
    size: ''
  - image: /assets/images/uploads/img_9499.jpeg
    alt: From the mountaintop in Portland, the view says it all 🇯🇲✨ Lush green mountains rolling into the endless blue sea, cool breeze on my face, and pure peace in every direction. There’s nothing like seeing Jamaica’s natural beauty from above — untouched, vibrant, and absolutely breathtaking. Portland, you’re a whole different kind of beautiful
    size: ''

  - name: Cinchona Botanical Gardens
    date: "2026-03-07"
    time: 5:00 AM- Flow Head Office Parking Lot ,Half Way Tree Road
    spots: 1
    location: East Rural St. Andrew ( Blue Mountains)
    distance: 5 mi one way
    difficulty: moderate
    description: >-
      

      🌿 What's There

      The gardens still showcase unique orchids and many other plant species, with a spectacular view of the east side of the Blue Mountains, Strawberry Hills, and Kingston. Moa You'll find global varieties of temperate and semi-tropical plants — from eucalyptus and rubber trees to cork oaks and lilies — plus a Bamboo Walk with a velvety moss floor. Lime Tree Farm The gardens are described as somewhat semi-abandoned, but the natural beauty more than compensates.

      🏛️ History

      Established in 1868 by Governor Sir John Peter Grant, it was originally a centre for experimental botanical work. The cinchona trees planted there produce quinine, used to treat malaria, which is where the garden gets its name. Moa In 1903, the Jamaican government leased Cinchona to the New York Botanical Gardens and, later, to the Smithsonian Institute

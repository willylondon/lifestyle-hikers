  - name: Willy London
    handle: Some weekends hiker
    text: It's usually a challenge waking up at 4:00am to be at the meeting spot by
      5:00am on a day you should be resting, but I like a challenge and the
      group is so supportive and fun that you push through regardless. The
      feeling you get accomplishing such a climb and seeing how beautiful
      Jamaica is, is just breathtaking. I just love hiking with the group.
      Remember, it's a hike, not a race. Ask before you commit.
    rating: 5
    avatar: /assets/images/uploads/willy-.webp

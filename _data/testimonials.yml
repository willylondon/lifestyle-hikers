items:
  - name: Gary Reid
    handle: Weekend hiker
    text: Hiking with Lifestyle Hikers is an exceptional experience that blends
      fitness, adventure, and genuine community. Each hike is well organized,
      safe, and welcoming, creating an atmosphere where participants feel both
      challenged and supported. Beyond the physical benefits, it’s mentally
      refreshing — a chance to reconnect with nature and build meaningful
      connections. It’s more than a hike; it’s a lifestyle built on growth and
      excellence.
    rating: 5
    avatar: ""

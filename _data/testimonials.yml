items:
  - name: Sarah Jenkins
    handle: Weekend Hiker
    text: "The Blue Mountain hike was incredibly well-organized. The guides were patient, knowledgeable, and the recap video they provided was the perfect keepsake. Highly recommend Lifestyle Hikers!"
    avatar: ""
  - name: Marcus Wright
    handle: HR Director, TechCorp JA
    text: "We booked a Medium Group corporate package for our annual off-site. The logistics were flawless, and the team building that happened on the trail was invaluable. A top-tier experience."
    avatar: ""
  - name: Aaliyah Thompson
    handle: Nature Enthusiast
    text: "Catherine's Peak has always been on my bucket list. Going with this group made it feel safe and fun. The vibes, the music at the end, and the amazing photos made the day perfect."
    avatar: ""
  - name: David Park
    handle: "@davidtech"
    text: "The energy this group brings is unmatched. I've never felt more welcome on a trail!"
    avatar: ""
